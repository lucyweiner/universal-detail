<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Leave a Universal Detail customer review.">
    <title>Reviews | Universal Detail</title>
    <link rel="preload" href="assets/universal-detail-logo-transparent.png" as="image">
    <link rel="stylesheet" href="styles.css?v=21">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Universal Detail home">
        <img src="assets/universal-detail-logo-transparent.png" alt="Universal Detail logo">
        <img class="brand-wordmark" src="assets/universal-detail-wordmark-header.png" alt="Universal Detail">
      </a>
      <nav aria-label="Main navigation">
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="reviews.html">Reviews</a>
        <a href="quote.html">Quote</a>
        <a href="book.html">Book</a>
        <a class="nav-call" href="tel:+14803649446"><i data-lucide="phone-call" aria-hidden="true"></i>(480) 364-9446</a>
      </nav>
    </header>

    <main>
      <section class="reviews-section page-section" aria-labelledby="reviews-title">
        <div class="section-heading">
          <h1 id="reviews-title">Leave a review after your detail.</h1>
        </div>
        <div class="reviews-layout">
          <form class="review-form" id="reviewForm">
            <label>Name<input name="name" type="text" autocomplete="name" placeholder="Your name" required></label>
            <label>
              Rating
              <select name="rating" required>
                <option value="5">5 stars</option>
                <option value="4">4 stars</option>
                <option value="3">3 stars</option>
                <option value="2">2 stars</option>
                <option value="1">1 star</option>
              </select>
            </label>
            <label>Review<textarea name="review" rows="5" placeholder="How did your car look after the detail?" required></textarea></label>
            <label>Photo<input name="photo" type="file" accept="image/*"></label>
            <button class="primary-button" type="submit"><i data-lucide="send" aria-hidden="true"></i>Post Review</button>
          </form>
          <div class="reviews-list" id="reviewsList" aria-live="polite"></div>
        </div>
      </section>

      <section class="ready-section" aria-labelledby="ready-title">
        <div>
          <p class="eyebrow">Ready to Get Started?</p>
          <h2 id="ready-title">Book a mobile detail in the East Valley.</h2>
        </div>
        <div class="ready-actions">
          <a class="primary-button" href="tel:+14803649446">
            <i data-lucide="phone-call" aria-hidden="true"></i>
            Call Now
          </a>
          <a class="secondary-button" href="book.html">
            <i data-lucide="calendar-check" aria-hidden="true"></i>
            Book an Appointment
          </a>
        </div>
      </section>
    </main>

    <footer>
      <img class="footer-wordmark" src="assets/universal-detail-wordmark-header.png" alt="Universal Detail">
      <div class="footer-links">
        <a href="tel:+14803649446">(480) 364-9446</a>
        <a class="social-link" href="https://www.instagram.com/universal.detail/" target="_blank" rel="noopener" aria-label="Universal Detail Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4.2"></circle>
            <circle cx="17.2" cy="6.8" r="1.15"></circle>
          </svg>
        </a>
        <a class="social-link" href="https://www.tiktok.com/@universal.detail" target="_blank" rel="noopener" aria-label="Universal Detail TikTok">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.7 3v10.45a4.95 4.95 0 1 1-4.95-4.95c.38 0 .75.04 1.1.13v3.25a1.8 1.8 0 1 0 .78 1.48V3h3.07Z"></path>
            <path d="M14.7 3c.35 2.7 1.88 4.28 4.55 4.45v3.12c-1.75-.04-3.3-.6-4.55-1.62V3Z"></path>
          </svg>
        </a>
      </div>
    </footer>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js?v=21"></script>
  </body>
</html>
