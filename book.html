<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Book a Universal Detail mobile car detailing appointment in Chandler and the East Valley.">
    <title>Book an Appointment | Universal Detail</title>
    <link rel="preload" href="assets/universal-detail-logo-transparent.png" as="image">
    <link rel="stylesheet" href="styles.css?v=24">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Universal Detail home">
        <img src="assets/universal-detail-logo-transparent.png" alt="Universal Detail logo">
        <img class="brand-wordmark" src="assets/universal-detail-wordmark-header.png" alt="Universal Detail">
      </a>
      <nav aria-label="Main navigation">
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="reviews.html">Reviews</a>
        <a href="book.html" aria-current="page">Book</a>
        <a href="quote.html">Quote</a>
        <a class="nav-call" href="tel:+14803649446"><i data-lucide="phone-call" aria-hidden="true"></i>(480) 364-9446</a>
      </nav>
    </header>

    <main class="booking-page-main">
      <section class="booking-section page-section" aria-labelledby="booking-title">
        <div class="booking-card">
          <div class="booking-copy">
            <h1 id="booking-title">Book an Appointment</h1>
          </div>

          <form class="booking-request-form" id="bookingRequestForm">
            <input name="slotStart" type="hidden">
            <div class="booking-fields">
              <label>
                <span>Name</span>
                <input name="name" type="text" autocomplete="name" placeholder="Name" required>
              </label>
              <label>
                <span>Email</span>
                <input name="email" type="email" autocomplete="email" placeholder="Email">
              </label>
              <label>
                <span>Service</span>
                <select name="service" required>
                  <option value="" selected disabled>Service</option>
                  <option value="The Star Package">The Star Package</option>
                  <option value="The Galaxy Package">The Galaxy Package</option>
                  <option value="Not Sure Yet">Not Sure Yet</option>
                </select>
              </label>
              <label>
                <span>Phone</span>
                <input name="phone" type="tel" autocomplete="tel" placeholder="Phone" required>
              </label>
            </div>

            <label class="vehicle-details">
              <span>Vehicle details</span>
              <textarea name="vehicle" rows="3" placeholder="Year, make, model, and anything we should know"></textarea>
            </label>

            <div class="booking-slots-panel">
              <div class="booking-slots-heading">
                <div>
                  <span>Select a date</span>
                  <p class="form-note" id="slotsStatus" aria-live="polite">Loading availability...</p>
                </div>
                <button class="secondary-button" id="refreshSlotsButton" type="button">
                  <i data-lucide="refresh-cw" aria-hidden="true"></i>
                  Refresh
                </button>
              </div>
              <div class="slots-list" id="slotsList"></div>
            </div>

            <button class="primary-button" type="submit">
              <i data-lucide="calendar-check" aria-hidden="true"></i>
              Book Appointment
            </button>
            <p class="form-note" id="bookingRequestNote" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <img class="footer-wordmark" src="assets/universal-detail-wordmark-header.png" alt="Universal Detail">
      <div class="footer-links">
        <a href="tel:+14803649446">(480) 364-9446</a>
        <a class="social-link" href="https://www.instagram.com/universal.detail/" target="_blank" rel="noopener" aria-label="Universal Detail Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4.2"></circle>
            <circle cx="17.2" cy="6.8" r="1.15"></circle>
          </svg>
        </a>
        <a class="social-link" href="https://www.tiktok.com/@universal.detail" target="_blank" rel="noopener" aria-label="Universal Detail TikTok">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.7 3v10.45a4.95 4.95 0 1 1-4.95-4.95c.38 0 .75.04 1.1.13v3.25a1.8 1.8 0 1 0 .78 1.48V3h3.07Z"></path>
            <path d="M14.7 3c.35 2.7 1.88 4.28 4.55 4.45v3.12c-1.75-.04-3.3-.6-4.55-1.62V3Z"></path>
          </svg>
        </a>
      </div>
    </footer>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js?v=24"></script>
  </body>
</html>
